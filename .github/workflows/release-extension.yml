name: Release Extension

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stamp release version
        id: version
        run: |
          RELEASE_VERSION=$(node scripts/set-release-version.mjs)
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify build inputs
        run: pnpm typecheck

      - name: Build production extension
        run: pnpm build

      - name: Build release package
        run: pnpm package

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Verify packaged extension
        run: pnpm exec playwright test

      - name: Rename package artifact
        run: mv build/chrome-mv3-prod.zip "build/ebisu-${{ steps.version.outputs.release_version }}-chrome.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ebisu-chrome-${{ steps.version.outputs.release_version }}
          path: build/ebisu-${{ steps.version.outputs.release_version }}-chrome.zip
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.release_version }}
          name: Ebisu v${{ steps.version.outputs.release_version }}
          generate_release_notes: true
          files: build/ebisu-${{ steps.version.outputs.release_version }}-chrome.zip
