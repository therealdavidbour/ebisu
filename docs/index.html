<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Ebisu helps job seekers find fresh roles directly from ATS source pages and track them locally as they search." />
    <title>Ebisu - ATS-source job search</title>
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #111c24;
        --ink: #fdf6e3;
        --muted: #93a1a1;
        --dim: #586e75;
        --rule: #2e6070;
        --cream: #cf7a64;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 50% -10%, rgba(46, 96, 112, 0.28), transparent 34rem),
          linear-gradient(180deg, var(--bg), #0d171d 76%);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: -0.01em;
        line-height: 1.5;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at 50% -10%, rgba(42, 161, 152, 0.12), transparent 34rem);
      }

      a { color: inherit; }

      .page { width: min(1120px, calc(100% - 48px)); margin: 0 auto; }

      header {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        min-height: 76px;
        border-bottom: 1px solid var(--rule);
      }

      .nav-left,
      .nav-right { display: flex; align-items: center; gap: 22px; }
      .nav-right { justify-content: flex-end; }

      .nav-link {
        color: var(--muted);
        font-size: 15px;
        font-weight: 520;
        letter-spacing: 0;
        text-decoration: none;
      }

      .nav-link:hover { color: var(--ink); }

      .wordmark {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--ink);
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -0.02em;
        text-decoration: none;
      }

      .wordmark img { width: 28px; height: 28px; image-rendering: pixelated; }

      .star-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 40px;
        border-radius: 999px;
        padding: 0 18px;
        background: var(--cream);
        color: #111c24;
        font-size: 14px;
        font-weight: 800;
        text-decoration: none;
      }

      .hero {
        display: grid;
        align-content: center;
        max-width: 920px;
        min-height: calc(100vh - 76px - 104px);
        margin: 0 auto;
        padding: 56px 0 64px;
        text-align: center;
      }

      .hero-logo {
        display: block;
        width: 112px;
        height: 112px;
        margin: 0 auto 24px;
        image-rendering: pixelated;
      }

      h1, p { margin: 0; }

      h1 {
        max-width: 780px;
        margin: 0 auto;
        font-size: clamp(54px, 9vw, 92px);
        line-height: 0.98;
        letter-spacing: -0.055em;
      }

      .lead {
        max-width: 560px;
        margin: 30px auto 0;
        color: var(--muted);
        font-size: clamp(19px, 2.4vw, 24px);
        letter-spacing: -0.015em;
        line-height: 1.45;
      }

      .actions {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 16px;
        margin-top: 42px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 148px;
        min-height: 52px;
        border: 1px solid var(--rule);
        border-radius: 14px;
        padding: 0 24px;
        background: rgba(21, 34, 43, 0.72);
        color: var(--muted);
        font-size: 16px;
        font-weight: 650;
        text-decoration: none;
      }

      .button.primary {
        border-color: transparent;
        border-radius: 999px;
        background: var(--cream);
        color: #111c24;
      }

      footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 16px;
        padding: 34px 0;
        border-top: 1px solid var(--rule);
        color: var(--dim);
        font-size: 14px;
      }

      footer a { color: var(--muted); }

      .footer-links { display: flex; align-items: center; gap: 14px; }

      .icon-link {
        display: inline-grid;
        place-items: center;
        width: 36px;
        height: 36px;
        border: 1px solid var(--rule);
        border-radius: 999px;
        color: var(--muted);
        text-decoration: none;
      }

      .icon-link:hover { color: var(--ink); border-color: var(--muted); }
      .icon-link svg { width: 18px; height: 18px; fill: currentColor; }

      @media (max-width: 820px) {
        .page { width: min(100% - 32px, 1120px); }
        header { grid-template-columns: 1fr; gap: 14px; padding: 16px 0; }
        .nav-left, .nav-right { justify-content: center; flex-wrap: wrap; }
        .wordmark { justify-content: center; }
        .hero { min-height: auto; padding: 34px 0 44px; }
        .hero-logo { width: 76px; height: 76px; margin-bottom: 20px; }
        h1 { font-size: 48px; line-height: 1; }
        .lead { margin-top: 22px; }
        .actions { margin-top: 30px; }
        footer { padding: 24px 0; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <nav class="nav-left" aria-label="Primary navigation">
          <a class="nav-link" href="privacy.html">Privacy</a>
          <a class="nav-link" href="https://github.com/therealdavidbour/ebisu/issues">Support</a>
        </nav>
        <a class="wordmark" href="./" aria-label="Ebisu home">
          <img src="assets/icon.svg" alt="" />
          <span>Ebisu</span>
        </a>
        <div class="nav-right">
          <a class="star-pill" href="https://github.com/therealdavidbour/ebisu">☆ GitHub</a>
        </div>
      </header>

      <main>
        <section class="hero">
          <img class="hero-logo" src="assets/icon.svg" alt="Ebisu pixel E logo" />
          <h1>See the job before everyone else does.</h1>
          <p class="lead">Ebisu surfaces openings directly from ATS source pages so you can discover fresh roles earlier and stay organized as you search.</p>
          <div class="actions">
            <a class="button primary" href="https://chromewebstore.google.com/detail/REPLACE_WITH_EXTENSION_ID">Add to Chrome</a>
            <a class="button" href="privacy.html">Privacy policy ↗</a>
          </div>
        </section>
      </main>

      <footer>
        <span>© 2026 Ebisu.</span>
        <span class="footer-links">
          <a class="icon-link" href="mailto:davidbourblog.autograph315@passinbox.com" aria-label="Email support">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm-.4 4.25-7.07 5.3a.88.88 0 0 1-1.06 0L4.4 8.25A1 1 0 0 1 5.6 6.65L12 11.45l6.4-4.8a1 1 0 1 1 1.2 1.6Z" /></svg>
          </a>
          <a class="icon-link" href="https://github.com/therealdavidbour/ebisu/issues" aria-label="GitHub Issues">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .5A11.5 11.5 0 0 0 8.36 22.9c.58.1.79-.25.79-.56v-2.15c-3.22.7-3.9-1.38-3.9-1.38-.53-1.34-1.3-1.7-1.3-1.7-1.05-.72.08-.71.08-.71 1.17.08 1.79 1.2 1.79 1.2 1.04 1.78 2.73 1.27 3.4.97.1-.75.41-1.27.74-1.56-2.57-.29-5.27-1.28-5.27-5.72 0-1.27.45-2.3 1.2-3.11-.12-.29-.52-1.47.11-3.07 0 0 .98-.31 3.2 1.19a11.04 11.04 0 0 1 5.82 0c2.22-1.5 3.2-1.19 3.2-1.19.63 1.6.23 2.78.11 3.07.75.81 1.2 1.84 1.2 3.11 0 4.45-2.7 5.43-5.28 5.72.42.36.79 1.07.79 2.16v3.17c0 .31.21.67.8.56A11.5 11.5 0 0 0 12 .5Z" /></svg>
          </a>
        </span>
      </footer>
    </div>
  </body>
</html>
