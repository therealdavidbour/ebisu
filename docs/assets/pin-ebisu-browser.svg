  <text x="82" y="182" fill="#93a1a1" font-family="Inter, Arial, sans-serif" font-size="16">After install, open Chrome's Extensions menu, find Ebisu,</text>
  <text x="82" y="206" fill="#93a1a1" font-family="Inter, Arial, sans-serif" font-size="16">and click the pin icon to keep it in the toolbar.</text>
