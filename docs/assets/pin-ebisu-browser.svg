  <circle cx="523" cy="355" r="15" fill="#cf7a64"/>
  <text x="551" y="350" fill="#fdf6e3" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">1. Click Extensions</text>
  <text x="551" y="372" fill="#93a1a1" font-family="Inter, Arial, sans-serif" font-size="13">Then pin Ebisu from the menu.</text>
  <path d="M470 156c-34 0-52 10-69 28-14 14-25 32-38 56" fill="none" stroke="#cf7a64" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 10"/>
