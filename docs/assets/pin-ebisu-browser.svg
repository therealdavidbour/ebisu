<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">Pin Ebisu in Chrome</title>
  <desc id="desc">An illustration of the Chrome toolbar showing the extensions menu open with Ebisu pinned.</desc>
