  <text x="518" y="164" fill="#93a1a1" font-family="Inter, Arial, sans-serif" font-size="13">Search extensions</text>
  <rect x="500" y="196" width="144" height="72" rx="16" fill="#0f1b22" stroke="#2e6070"/>
  <rect x="516" y="214" width="24" height="24" fill="#cf7a64"/>
